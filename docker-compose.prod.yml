# Deploy de produção (VPS + Docker Compose, conforme ARQUITETURA-REFERENCIA.md).
#
# Uso:
#   cp .env.prod.example .env.prod   # preencher com valores reais
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Postgres e Redis NUNCA expõem porta ao host — só acessíveis pela rede interna do compose
# (backend fala com eles por nome de serviço). Só backend/frontend publicam porta, e ambas são
# configuráveis via .env.prod para não colidir com outro sistema já rodando no servidor.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proptech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-proptech}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proptech}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-proptech}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-proptech}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env.prod (32+ bytes aleatórios)}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?defina ENCRYPTION_KEY no .env.prod (Fernet.generate_key())}
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN:-localhost}
      TRIAL_DAYS: 7
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend/apps/corretor
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8090}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
