map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota que não seja um arquivo estático cai no index.html
    # (o roteamento de fato é feito pelo vue-router no navegador).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para a API — mesmo caminho /api usado em dev (vite.config.js).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necessário para o WebSocket de notificações (/api/v1/ws/notificacoes) sem quebrar
        # requisições HTTP normais no mesmo location (padrão map do nginx).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location = /health {
        proxy_pass http://backend:8000/health;
    }
}
